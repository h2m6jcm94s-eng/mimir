services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mimir
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  temporal:
    image: temporalio/auto-setup:latest
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PWD=postgres
      - POSTGRES_SEEDS=postgres
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/docker.yaml
    ports:
      - '7233:7233'
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'tctl', '--address', 'temporal:7233', 'workflow', 'list']
      interval: 10s
      timeout: 5s
      retries: 10

  temporal-ui:
    image: temporalio/ui:latest
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:3000
    ports:
      - '8080:8080'
    depends_on:
      temporal:
        condition: service_healthy

  supertokens:
    image: registry.supertokens.io/supertokens/supertokens-postgresql:9.3
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRESQL_CONNECTION_URI: postgresql://postgres:postgres@postgres:5432/mimir
      POSTGRESQL_TABLE_SCHEMA: supertokens
      API_KEYS: ${SUPERTOKENS_API_KEY:-change-me-in-production}
    ports:
      - '3567:3567'
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3567/hello']
      interval: 10s
      timeout: 5s
      retries: 5

  libsql-primary:
    image: ghcr.io/tursodatabase/libsql-server:latest
    environment:
      SQLD_NODE: primary
    ports:
      - '8081:8080'
      - '5001:5001'
    volumes:
      - libsql_data:/var/lib/sqld
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8080/health']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  libsql_data:
