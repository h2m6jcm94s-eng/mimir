<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mimir Quick Capture — Options</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }
      body {
        margin: 0;
        padding: 2rem;
        background: canvas;
        color: canvastext;
      }
      label {
        display: block;
        margin-bottom: 0.5rem;
        font-weight: 500;
      }
      input {
        width: 100%;
        max-width: 400px;
        padding: 0.5rem;
        border: 1px solid color-mix(in srgb, canvastext 20%, transparent);
        border-radius: 0.375rem;
        background: canvas;
        color: canvastext;
      }
      button {
        margin-top: 1rem;
        padding: 0.5rem 1rem;
        border: none;
        border-radius: 0.375rem;
        background: #2563eb;
        color: white;
        cursor: pointer;
      }
      #status {
        margin-top: 1rem;
        font-size: 0.875rem;
      }
    </style>
  </head>
  <body>
    <h1>Mimir Quick Capture</h1>
    <form id="options">
      <label for="apiUrl">Mimir API base URL</label>
      <input id="apiUrl" type="url" placeholder="http://localhost:3001" required />
      <button type="submit">Save</button>
      <p id="status"></p>
    </form>
    <script type="module" src="./options.js"></script>
  </body>
</html>
