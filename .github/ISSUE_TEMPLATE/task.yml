name: Task
description: A concrete engineering task with acceptance criteria.
labels: [task]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are we solving and why?
    validations:
      required: true
  - type: textarea
    id: proposed_solution
    attributes:
      label: Proposed solution
      description: High-level approach.
    validations:
      required: true
  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance criteria
      description: Binary checks that define done.
    validations:
      required: true
  - type: textarea
    id: test_plan
    attributes:
      label: Test plan
      description: How will this be verified?
    validations:
      required: true
  - type: textarea
    id: out_of_scope
    attributes:
      label: Out of scope
      description: What is deliberately not included?
