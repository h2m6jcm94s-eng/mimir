name: Feature Request
description: Suggest a new capability.
labels: [feature]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed feature
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
