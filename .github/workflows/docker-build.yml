name: Docker build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Build API image
        run: docker build -f docker/Dockerfile.api -t mimir/api:latest .

      - name: Build web image
        run: docker build -f docker/Dockerfile.web -t mimir/web:latest .

      - name: Build worker image
        run: docker build -f docker/Dockerfile.worker -t mimir/worker:latest .
